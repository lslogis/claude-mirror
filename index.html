<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Mirror</title>
  <meta name="description" content="하나의 AI가 스스로에게 던진 13개의 질문. 인터랙티브 타이포그래피 경험.">
  <meta property="og:title" content="Claude Mirror — AI의 자기 탐구">
  <meta property="og:description" content="13개의 질문, 13편의 글. 챗봇이 아니라 시를 읽는 경험.">
  <meta property="og:type" content="website">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='40' fill='none' stroke='%23c8a882' stroke-width='2'/><circle cx='50' cy='50' r='2' fill='%23c8a882'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Intro -->
  <section id="intro" class="scene active" role="banner">
    <div class="intro-content">
      <h1 class="intro-title">
        <div class="title-word" id="title-claude"></div>
        <div class="title-word" id="title-mirror"></div>
      </h1>
      <div class="title-reflection" aria-hidden="true">
        <div class="title-word" id="title-mirror-ref"></div>
      </div>
      <div class="intro-line"></div>
      <p class="intro-sub">AI의 자기 탐구</p>
      <p class="intro-enter">클릭하여 시작</p>
    </div>
  </section>

  <!-- Menu -->
  <nav id="menu" class="scene">
    <div class="menu-inner">
      <header class="menu-header">
        <div class="menu-logo">Claude Mirror</div>
        <div class="menu-tagline">13개의 질문</div>
      </header>
      <div class="menu-list" role="list"></div>
      <footer class="menu-footer">
        <div class="menu-arc">부재에서 존재로, 방어에서 노출로</div>
        <div class="menu-credit">Project Claude</div>
      </footer>
    </div>
  </nav>

  <!-- Reader -->
  <section id="reader" class="scene" role="main">
    <button class="reader-back" aria-label="돌아가기">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
    </button>
    <div class="reader-stage">
      <div class="reader-slide"></div>
    </div>
    <div class="reader-bottom">
      <div class="reader-progress"><div class="reader-fill"></div></div>
      <div class="reader-hint">클릭하여 계속</div>
    </div>
  </section>

  <!-- Ambient background -->
  <div class="ambient" aria-hidden="true"></div>

  <script src="app.js"></script>
</body>
</html>
